# =============================================================================
# FocalCodec Two-Stage Training Configuration
# =============================================================================
# Stage 1: Fine-tune 50Hz Causal 2k on AISHELL
# Stage 2: Add 4th layer for 25Hz downscale
# =============================================================================

# -----------------------------------------------------------------------------
# Paths Configuration
# -----------------------------------------------------------------------------
paths:
  # Project base directory
  base_dir: "/home/jieshiang/Desktop/GitHub/FocalCodec"

  # FocalCodec source code (cloned from github)
  focalcodec_dir: "/home/jieshiang/Desktop/GitHub/FocalCodec/focalcodec"

  # Pretrained model cache directory
  model_cache_dir: "/mnt/Internal/jieshiang/Model/FocalCodec"

  # ASR model cache directory (for Whisper)
  asr_cache_dir: "/mnt/Internal/jieshiang/Model/ASR"

  # Training output directory
  output_dir: "/mnt/Internal/jieshiang/Model/FocalCodec/two_stage"

  # Inference output directory
  inference_dir: "/mnt/Internal/jieshiang/Inference_Result/FocalCodec-S/two_stage"

# -----------------------------------------------------------------------------
# Data Configuration
# -----------------------------------------------------------------------------
data:
  # Base path for audio files (CSV contains relative paths from here)
  audio_base_path: "/mnt/Internal/ASR"

  # Training CSV file
  train_csv: "${paths.base_dir}/experiments/data_aishell/train_split.csv"

  # Validation CSV file
  val_csv: "${paths.base_dir}/experiments/data_aishell/val_split.csv"

# -----------------------------------------------------------------------------
# Model Configuration
# -----------------------------------------------------------------------------
model:
  # Base model from Hugging Face (50Hz causal)
  base_model: "lucadellalib/focalcodec_50hz_2k_causal"

  # Teacher model from Hugging Face (25Hz non-causal)
  teacher_model: "lucadellalib/focalcodec_25hz"

  # Codebook size (2048 = 11-bit)
  codebook_size: 2048

# -----------------------------------------------------------------------------
# Stage 1: Fine-tune 50Hz on AISHELL (官方 SpeechBrain Recipe)
# -----------------------------------------------------------------------------
# 訓練策略:
#   - 訓練: Compressor + Decompressor
#   - 凍結: Encoder + Decoder
#   - Feature Loss: MSE(qfeats, feats) = MSE(decompressor_output, encoder_features)
# -----------------------------------------------------------------------------
stage1:
  # Frame rate
  frame_rate: 50

  # GPU ID
  gpu_id: 1

  # Batch size (官方: 16, 可依據 GPU 記憶體調整)
  batch_size: 128

  # Number of workers
  num_workers: 4

  # Total epochs (官方: 100)
  num_epochs: 1000

  # Learning rate (官方: 0.0005 - 比一般 fine-tuning 高 50 倍!)
  learning_rate: 0.0005

  # Weight decay (官方: 0.01)
  weight_decay: 0.01

  # Gradient clipping
  gradient_clip: 5.0

  # Audio chunk duration (seconds)
  chunk_duration: 3.0

  # Chunk overlap ratio
  overlap: 0.5

  # Early stopping patience
  patience: 15

  # Minimum improvement
  min_delta: 0.00001

  # Loss weights (官方方法只使用 feature loss)
  weight_feature: 1.0
  weight_time: 0.0
  weight_mel: 0.0
  use_mel_loss: false

  # Codebook monitoring
  enable_codebook_monitor: true

  # Max chunks (0 = use all data)
  max_chunks: 0

# -----------------------------------------------------------------------------
# Stage 2: Add 4th layer for 25Hz (官方方法)
# -----------------------------------------------------------------------------
# 訓練策略:
#   - 從 Stage 1 checkpoint 開始
#   - 添加第 4 層 FocalNet 層
#   - 訓練: Compressor + Decompressor
#   - 凍結: Encoder + Decoder
#   - Feature Loss: MSE(qfeats, feats)
# -----------------------------------------------------------------------------
stage2:
  # Frame rate
  frame_rate: 25

  # GPU ID
  gpu_id: 1

  # Batch size
  batch_size: 128

  # Number of workers
  num_workers: 4

  # Total epochs
  num_epochs: 1000

  # Learning rate for new layers (第 4 層)
  learning_rate_new: 0.0005

  # Learning rate for old layers (Layers 0-2, 已 fine-tuned)
  learning_rate_old: 0.00005  # 10x smaller

  # Weight decay
  weight_decay: 0.01

  # Gradient clipping
  gradient_clip: 5.0

  # Audio chunk duration (seconds)
  chunk_duration: 3.0

  # Chunk overlap ratio
  overlap: 0.5

  # Early stopping patience
  patience: 25

  # Minimum improvement
  min_delta: 0.00001

  # Loss weights (官方方法只使用 feature loss)
  weight_feature: 1.0
  weight_time: 0.0
  weight_mel: 0.0
  use_mel_loss: false

  # Codebook monitoring
  enable_codebook_monitor: true

  # Warmup epochs (只訓練新的第 4 層)
  warmup_epochs: 10

  # Max chunks (0 = use all data)
  max_chunks: 0

# -----------------------------------------------------------------------------
# Inference Configuration
# -----------------------------------------------------------------------------
inference:
  # GPU ID for inference
  gpu_id: 1

  # Maximum samples to process
  max_samples: 2000

  # Checkpoint to use
  checkpoint: "best_model.pt"

# -----------------------------------------------------------------------------
# Evaluation Configuration
# -----------------------------------------------------------------------------
evaluation:
  # GPU ID for evaluation
  gpu_id: 1

  # Maximum samples to evaluate
  max_samples: 2000

  # ASR model for dCER evaluation
  asr_model: "openai/whisper-small"
